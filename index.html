  .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

  .match-item.wrong { border-color: #E89B8E; background: #FCEFED; animation: shake 0.3s ease; }

  .match-progress { text-align: center; margin-top: 16px; font-size: 13.5px; color: #8A8378; }

  /* Error spotting */
  .error-card { padding: 18px; margin-bottom: 14px; }

  .error-word:hover { border-color: #2B5B4D; }
  .error-word.picked-correct { border-color: #2B5B4D; background: #F1F7F4; color: #2B5B4D; font-weight: 700; }
  .error-word.picked-wrong { border-color: #E89B8E; background: #FCEFED; color: #A8453E; }
  .error-solution { padding: 12px 14px; border-radius: 8px; background: #F1F7F4; border: 1px solid #B8D9CB; font-size: 13.5px; color: #2B5B4D; line-height: 1.5; }

  /* Scenario */
  .scenario-setup { background: #F7F2EA; border-left: 3px solid #E8B25E; padding: 14px 16px; border-radius: 0 8px 8px 0; margin-bottom: 18px; font-size: 14.5px; color: #4A463F; line-height: 1.6; }
  .chat-bubble { max-width: 80%; padding: 12px 16px; border-radius: 14px; margin-bottom: 12px; font-size: 14.5px; line-height: 1.5; }

  .chat-bubble.you { background: #2B5B4D; color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
  .chat-speaker { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.6; margin-bottom: 4px; }
  .chat-blank-area { margin-left: auto; max-width: 80%; }
  .chat-textarea { width: 100%; padding: 12px 16px; border-radius: 14px; border: 1.5px solid #E8DFD3; font-family: inherit; font-size: 14.5px; resize: vertical; min-height: 60px; }
  .chat-textarea:focus { outline: none; border-color: #2B5B4D; }
  .scenario-hint { font-size: 12.5px; color: #9C7A3C; margin: 6px 0 0 0; }
  .scenario-example-toggle { font-size: 12.5px; color: #2B5B4D; font-weight: 600; cursor: pointer; background: none; border: none; padding: 4px 0; margin-top: 4px; }
  .scenario-example { background: #F1F7F4; border: 1px solid #B8D9CB; border-radius: 8px; padding: 10px 14px; font-size: 13.5px; color: #2B5B4D; margin-top: 6px; line-height: 1.5; }


</style>

const XP_EXERCISE_FIRST_TRY = 10;
const XP_EXERCISE_RETRY = 5;
const XP_MODULE_COMPLETE = 50;
const XP_MATCHING_GAME = 15;
const XP_ERROR_SPOTTING = 10;
const XP_SCENARIO = 20;

/* =========================================================
   4) ESTADO DA APLICAÇÃO
   ========================================================= */
let state = {
  user: null,
  loaded: false,
  syncStatus: "loading", // loading | synced | saving | error
  activeModule: 0,
  view: "overview",
  progress: { completedExercises: {}, completedModules: {}, notes: {}, xp: 0, streak: 0, lastStudyDate: null, earnedBadges: {} },
  answers: {},
  revealed: {},
  checkedAnswers: {},
  xpToast: null,
  newBadgeToast: null,
  // Phase 2 state (per-module, reset on module change)
  matchSelected: { side: null, idx: null },
  matchMatched: {}, // idx of left items that are matched
  matchWrong: null,
  errorPicks: {}, // exerciseIdx -> { word, correct }
  scenarioAnswers: {}, // "modIdx-lineIdx" -> text
  scenarioExampleShown: {},
  matchRightOrder: null // shuffled array of indices for right column
};

let saveTimeout = null;

function setState(patch) {
  state = { ...state, ...patch };
  render();
}

/* =========================================================
   5) FIREBASE: AUTH + FIRESTORE
   ========================================================= */
function normalizeProgress(p) {
  return {
    completedExercises: p.completedExercises || {},
    completedModules: p.completedModules || {},
    completedGames: p.completedGames || {}, // e.g. "1-matching", "1-scenario-0", "1-error-2"
    notes: p.notes || {},
    xp: p.xp || 0,
    streak: p.streak || 0,
    lastStudyDate: p.lastStudyDate || null,
    earnedBadges: p.earnedBadges || {}
  };
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function yesterdayStr() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0, 10);
}

// Updates streak based on today's activity. Returns updated progress.
function applyStreak(progress) {
  const today = todayStr();
  if (progress.lastStudyDate === today) return progress; // already counted today
  let streak = progress.streak || 0;
  if (progress.lastStudyDate === yesterdayStr()) {
    streak += 1;
  } else {
    streak = 1;
  }
  return { ...progress, streak, lastStudyDate: today };
}

// Awards XP and checks for new badges. Returns { progress, newBadges }
function awardXP(progress, amount) {
  let p = applyStreak(progress);
  p = { ...p, xp: (p.xp || 0) + amount };
  const newBadges = [];
  const earnedBadges = { ...p.earnedBadges };
  BADGES.forEach(b => {
    if (!earnedBadges[b.id] && b.condition(p)) {
      earnedBadges[b.id] = true;
      newBadges.push(b);
    }
  });
  p = { ...p, earnedBadges };
  return { progress: p, newBadges };
}

onAuthStateChanged(auth, async (user) => {
  if (user) {
    setState({ user, syncStatus: "loading" });
    try {
      const ref = doc(db, "progress", user.uid);
      const snap = await getDoc(ref);
      if (snap.exists()) {
        setState({ progress: normalizeProgress(snap.data().progress || {}), loaded: true, syncStatus: "synced" });
      } else {
        setState({ progress: normalizeProgress({}), loaded: true, syncStatus: "synced" });
      }
    } catch (e) {
      console.error(e);
      setState({ progress: normalizeProgress({}), loaded: true, syncStatus: "error" });
    }
  } else {
    setState({ user: null, loaded: false });
  }
});

async function saveProgress() {
  if (!state.user || !state.loaded) return;
  setState({ syncStatus: "saving" });
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    try {
      const ref = doc(db, "progress", state.user.uid);
      await setDoc(ref, { progress: state.progress, updatedAt: Date.now() });
      setState({ syncStatus: "synced" });
    } catch (e) {
      console.error(e);
      setState({ syncStatus: "error" });
    }
  }, 400);
}

window.handleLogin = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    document.getElementById("login-error").textContent = "Erro ao iniciar sessão: " + e.message;
  }
};

window.handleLogout = async () => {
  await signOut(auth);
  setState({
    user: null, loaded: false,
    progress: normalizeProgress({}),
    activeModule: 0, view: "overview", answers: {}, revealed: {}, checkedAnswers: {}
  });
};

/* =========================================================
   6) AÇÕES
   ========================================================= */
window.selectModule = (idx) => {
  setState({
    activeModule: idx, view: "overview",
    matchSelected: { side: null, idx: null }, matchMatched: {}, matchWrong: null, matchRightOrder: null
  });
};

window.setView = (v) => setState({ view: v });

window.toggleExercise = (mIdx, eIdx) => {
  const key = `${mIdx}-${eIdx}`;
  const completedExercises = { ...state.progress.completedExercises };
  const wasCompleted = completedExercises[key];
  completedExercises[key] = !wasCompleted;

  let progress = { ...state.progress, completedExercises };

  if (!wasCompleted) {
    const wasChecked = state.checkedAnswers[key];
    const amount = (wasChecked && wasChecked.firstTryCorrect) ? XP_EXERCISE_FIRST_TRY : XP_EXERCISE_RETRY;
    const result = awardXP(progress, amount);
    progress = result.progress;
    showXpToast(amount, result.newBadges);
  }

  setState({ progress });
  saveProgress();
};

window.toggleModuleComplete = (mIdx) => {
  const completedModules = { ...state.progress.completedModules };
  const wasCompleted = completedModules[mIdx];
  completedModules[mIdx] = !wasCompleted;

  let progress = { ...state.progress, completedModules };

  if (!wasCompleted) {
    const result = awardXP(progress, XP_MODULE_COMPLETE);
    progress = result.progress;
    showXpToast(XP_MODULE_COMPLETE, result.newBadges, true);
  }

  setState({ progress });
  saveProgress();
};

// Checks a typed answer against the expected answer(s), returns feedback type
window.checkAnswer = (mIdx, eIdx) => {
  const key = `${mIdx}-${eIdx}`;
  const ex = MODULES[mIdx].exercises[eIdx];
  const userAnswer = (state.answers[key] || "").trim().toLowerCase();
  const correctAnswers = ex.a.split("/").map(s => s.trim().toLowerCase());
  const alternatives = (ex.acceptAlternatives || []).map(s => s.toLowerCase());

  let status = "incorrect";
  let message = null;

  if (correctAnswers.includes(userAnswer) || alternatives.includes(userAnswer)) {
    status = "correct";
  } else if (ex.commonWrong) {
    const matchKey = Object.keys(ex.commonWrong).find(k => k.toLowerCase() === userAnswer);
    if (matchKey) {
      status = "close";
      message = ex.commonWrong[matchKey];
    }
  }

  const checkedAnswers = { ...state.checkedAnswers };
  const isFirstCheck = !(key in state.checkedAnswers);
  const firstTryCorrect = isFirstCheck ? (status === "correct") : checkedAnswers[key].firstTryCorrect;
  checkedAnswers[key] = { status, message, firstTryCorrect };

  setState({ checkedAnswers });

  // Auto-mark as done if correct and not already done
  if (status === "correct" && !state.progress.completedExercises[key]) {
    window.toggleExercise(mIdx, eIdx);
  }
};

function showXpToast(amount, newBadges, isModule) {
  const toast = { amount, isModule, id: Date.now() };
  setState({ xpToast: toast });
  setTimeout(() => {
    if (state.xpToast && state.xpToast.id === toast.id) setState({ xpToast: null });
  }, 2000);
  if (newBadges && newBadges.length > 0) {
    setTimeout(() => {
      setState({ newBadgeToast: newBadges[0] });
      setTimeout(() => setState({ newBadgeToast: null }), 3000);
    }, 600);
  }
}

// Award XP for a one-off game/activity, only if not already completed
function completeGameOnce(gameKey, amount) {
  if (state.progress.completedGames[gameKey]) return;
  const completedGames = { ...state.progress.completedGames, [gameKey]: true };
  let progress = { ...state.progress, completedGames };
  const result = awardXP(progress, amount);
  progress = result.progress;
  showXpToast(amount, result.newBadges);
  setState({ progress });
  saveProgress();
}

/* ---- Matching game ---- */
window.matchSelect = (side, idx) => {
  const mod = MODULES[state.activeModule];
  const items = mod.matchingGame;

  if (state.matchMatched[idx] !== undefined && side === "left") return; // already matched

  const sel = state.matchSelected;

  if (sel.side === null) {
    setState({ matchSelected: { side, idx }, matchWrong: null });
    return;
  }

  if (sel.side === side) {
    // re-select on same side
    setState({ matchSelected: { side, idx }, matchWrong: null });
    return;
  }

  // Different sides selected -> check match
  const leftIdx = side === "left" ? idx : sel.idx;
  const rightIdx = side === "right" ? idx : sel.idx;

  if (leftIdx === rightIdx) {
    // Correct match (since right items are shuffled but keep same index mapping)
    const matchMatched = { ...state.matchMatched, [leftIdx]: true };
    setState({ matchMatched, matchSelected: { side: null, idx: null }, matchWrong: null });

    // Check if all matched
    if (Object.keys(matchMatched).length === items.length) {
      completeGameOnce(`${state.activeModule}-matching`, XP_MATCHING_GAME);
    }
  } else {
    setState({ matchWrong: { leftIdx, rightIdx } });
    setTimeout(() => {
      setState({ matchSelected: { side: null, idx: null }, matchWrong: null });
    }, 600);
  }
};

/* ---- Error spotting ---- */
window.pickErrorWord = (exIdx, word) => {
  const mod = MODULES[state.activeModule];
  const item = mod.errorSpotting[exIdx];
  const isCorrect = word.toLowerCase() === item.error.toLowerCase();

  const errorPicks = { ...state.errorPicks, [exIdx]: { word, correct: isCorrect } };
  setState({ errorPicks });

  if (isCorrect) {
    completeGameOnce(`${state.activeModule}-error-${exIdx}`, XP_ERROR_SPOTTING);
  }
};

/* ---- Scenario ---- */
window.updateScenarioAnswer = (key, value) => {
  state.scenarioAnswers[key] = value;
};

window.toggleScenarioExample = (key) => {
  const scenarioExampleShown = { ...state.scenarioExampleShown };
  scenarioExampleShown[key] = !scenarioExampleShown[key];
  setState({ scenarioExampleShown });
};

window.completeScenario = (mIdx) => {
  completeGameOnce(`${mIdx}-scenario`, XP_SCENARIO);
};

window.toggleReveal = (key) => {
  const revealed = { ...state.revealed };
  revealed[key] = !revealed[key];
  setState({ revealed });
};

window.updateAnswer = (key, value) => {
  state.answers[key] = value; // no re-render needed for typing
};

window.resetProgress = async () => {
  if (!confirm("Tens a certeza que queres reiniciar todo o progresso?")) return;
  const fresh = normalizeProgress({});
  setState({ progress: fresh, answers: {}, revealed: {}, checkedAnswers: {} });
  if (state.user) {
    try {
      const ref = doc(db, "progress", state.user.uid);
      await setDoc(ref, { progress: fresh, updatedAt: Date.now() });
    } catch (e) {}
  }
};

window.copyPrompt = (text) => {
  navigator.clipboard && navigator.clipboard.writeText(text);
};

window.prevModule = () => setState({ activeModule: Math.max(0, state.activeModule - 1), view: state.view, matchSelected: { side: null, idx: null }, matchMatched: {}, matchWrong: null, matchRightOrder: null });
window.nextModule = () => setState({ activeModule: Math.min(MODULES.length - 1, state.activeModule + 1), view: state.view, matchSelected: { side: null, idx: null }, matchMatched: {}, matchWrong: null, matchRightOrder: null });

/* =========================================================
   7) RENDER
   ========================================================= */
function moduleDoneCount(mIdx) {
  const m = MODULES[mIdx];
  return m.exercises.filter((_, eIdx) => state.progress.completedExercises[`${mIdx}-${eIdx}`]).length;
}

function syncLabel() {
  switch (state.syncStatus) {
    case "saving": return "· a guardar...";
    case "synced": return "· guardado";
    case "error": return "· erro ao guardar";
    default: return "";
  }
}

function render() {
  const app = document.getElementById("app");

  // --- LOGIN SCREEN ---
  if (!state.user) {
    app.innerHTML = `
      <div class="login-screen">
        <div class="em-card login-card">
          <h2>English in Motion</h2>
          <p>Inicia sessão com a tua conta Google para guardares o teu progresso e aceder de qualquer dispositivo.</p>
          <button class="login-btn" onclick="handleLogin()">${icons.google} Entrar com Google</button>
          <div id="login-error" class="login-error"></div>
        </div>
      </div>
    `;
    return;
  }

  // --- LOADING ---
  if (!state.loaded) {
    app.innerHTML = `<div class="login-screen"><p style="color:#8A8378;">A carregar o teu progresso...</p></div>`;
    return;
  }

  const mod = MODULES[state.activeModule];
  const totalExercises = MODULES.reduce((acc, m) => acc + m.exercises.length, 0);
  const totalDone = Object.values(state.progress.completedExercises).filter(Boolean).length;
  const overallPct = Math.round((totalDone / totalExercises) * 100);

  // Sidebar modules
  const sidebarHtml = MODULES.map((m, idx) => {
    const done = moduleDoneCount(idx);
    const isComplete = state.progress.completedModules[idx];
    const activeClass = state.activeModule === idx ? "active" : "";
    const iconColor = isComplete ? (state.activeModule === idx ? "#E8B25E" : "#2B5B4D") : (state.activeModule === idx ? "#C9DED6" : "#D8CFC2");
    return `
      <div class="module-nav-item ${activeClass}" onclick="selectModule(${idx})">
        <div class="module-title-row">
          <div style="font-size:14px; font-weight:600;">Módulo ${m.id}</div>
          <span style="color:${iconColor}; display:flex;">${isComplete ? icons.check : icons.circle}</span>
        </div>
        <div class="module-sub">${m.range} · ${done}/${m.exercises.length} exercícios</div>
      </div>
    `;
  }).join("");

  // Tabs
  const tabs = [
    { key: "overview", label: "Gramática", icon: "📘" },
    { key: "vocab", label: "Vocabulário", icon: "✨" },
    { key: "idioms", label: "Expressões", icon: "💬" },
    { key: "exercises", label: "Exercícios", icon: "✏️" },
    { key: "matching", label: "Jogo de Associação", icon: "🧩" },
    { key: "errors", label: "Encontra o Erro", icon: "🔍" },
    { key: "scenario", label: "Cenário", icon: "🎭" },

  const tabsHtml = tabs.map(t => `

      <span>${t.icon}</span> ${t.label}
    </button>

  // View content
  let viewHtml = "";
  if (state.view === "overview") {
    viewHtml = `
      <div class="em-card content-card">
        <h3 class="section-title">${mod.grammar.heading}</h3>
        <p class="grammar-text">${mod.grammar.explanation}</p>
        <div class="examples-label">Exemplos no contexto</div>
        ${mod.grammar.examples.map(ex => `<div class="example-box">${ex}</div>`).join("")}
      </div>
    `;
  } else if (state.view === "vocab") {
    viewHtml = `
      <div class="em-card content-card">
        <h3 class="section-title">Vocabulário-chave</h3>
        ${mod.vocab.map(v => `
          <div class="vocab-row">
            <span class="vocab-word">${v.word}</span>
            <span class="vocab-meaning">${v.meaning}</span>
          </div>
        `).join("")}
      </div>
    `;
  } else if (state.view === "idioms") {
    viewHtml = `
      <div class="em-card content-card">
        <h3 class="section-title">Expressões idiomáticas</h3>
        ${mod.idioms.map(idiom => `
          <div class="em-card idiom-card">
            <div class="idiom-phrase">"${idiom.phrase}"</div>
            <div class="idiom-meaning">${idiom.meaning}</div>
          </div>
        `).join("")}
        <div class="idiom-tip">💡 Regra de oro: não avances de módulo sem conseguires usar pelo menos 3 destas expressões numa frase tua, sem ajuda.</div>
      </div>
    `;
  } else if (state.view === "exercises") {
    viewHtml = `
      <div class="em-card content-card">
        <h3 class="section-title">Exercícios práticos</h3>
        ${mod.exercises.map((ex, i) => {
          const key = `${state.activeModule}-${i}`;
          const isDone = state.progress.completedExercises[key];
          const isRevealed = state.revealed[key];
          const iconColor = isDone ? "#2B5B4D" : "#D8CFC2";
          const checked = state.checkedAnswers[key];
          let feedbackHtml = "";
          if (checked && !isRevealed) {
            if (checked.status === "correct") {
              feedbackHtml = `<div class="feedback-box correct">✅ Correto! Muito bem.</div>`;
            } else if (checked.status === "close") {
              feedbackHtml = `<div class="feedback-box close">🤔 ${checked.message}</div>`;
            } else {
              feedbackHtml = `<div class="feedback-box incorrect">❌ Não é isso ainda. Tenta de novo ou vê a dica abaixo.</div>`;

          }
          return `
            <div class="exercise-card ${isDone ? "done" : ""}">
              <div class="exercise-top">
                <p class="exercise-q"><span class="exercise-num">${i + 1}.</span> ${ex.q}${isDone ? `<span class="xp-pill">+${XP_EXERCISE_FIRST_TRY} XP</span>` : ""}</p>
                <button class="check-btn" onclick="toggleExercise(${state.activeModule}, ${i})" style="color:${iconColor};">

              </div>
            </div>
          `;
        }).join("")}
        ${moduleDoneCount(state.activeModule) === mod.exercises.length ? `
          <div class="module-complete-banner">
            <div class="big">🎉 Todos os exercícios deste módulo concluídos!</div>

          </div>

      </div>

  } else if (state.view === "matching") {
    // Initialize shuffled right order if needed
    if (!state.matchRightOrder) {
      const order = mod.matchingGame.map((_, i) => i);
      for (let i = order.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [order[i], order[j]] = [order[j], order[i]];
      }
      state.matchRightOrder = order; // mutate directly, no re-render needed yet
    }
    const allMatched = Object.keys(state.matchMatched).length === mod.matchingGame.length;
    viewHtml = `
      <div class="em-card content-card">
        <h3 class="section-title">Jogo de Associação</h3>
        <p style="color:#8A8378; font-size:14px; margin-bottom:18px;">Clica numa expressão à esquerda e no significado correspondente à direita.</p>
        <div class="match-grid">
          <div>
            <div class="match-col-label">Expressão</div>
            ${mod.matchingGame.map((item, idx) => {
              const isMatched = state.matchMatched[idx] !== undefined;
              const isSelected = state.matchSelected.side === "left" && state.matchSelected.idx === idx;
              const isWrong = state.matchWrong && state.matchWrong.leftIdx === idx;
              let cls = "match-item";
              if (isMatched) cls += " matched";
              else if (isSelected) cls += " selected";
              if (isWrong) cls += " wrong";
              return `<div class="${cls}" onclick="matchSelect('left', ${idx})">${item.left}</div>`;
            }).join("")}
          </div>
          <div>
            <div class="match-col-label">Significado</div>
            ${state.matchRightOrder.map((origIdx) => {
              const item = mod.matchingGame[origIdx];
              const isMatched = state.matchMatched[origIdx] !== undefined;
              const isSelected = state.matchSelected.side === "right" && state.matchSelected.idx === origIdx;
              const isWrong = state.matchWrong && state.matchWrong.rightIdx === origIdx;
              let cls = "match-item";
              if (isMatched) cls += " matched";
              else if (isSelected) cls += " selected";
              if (isWrong) cls += " wrong";
              return `<div class="${cls}" onclick="matchSelect('right', ${origIdx})">${item.right}</div>`;
            }).join("")}
          </div>
        </div>
        ${allMatched ? `
          <div class="module-complete-banner" style="margin-top:18px;">
            <div class="big">🧩 Associaste todas as expressões!</div>
            <div class="small">+${XP_MATCHING_GAME} XP ${state.progress.completedGames[`${state.activeModule}-matching`] ? "(já recolhido)" : "ganho"}</div>
          </div>
        ` : `<div class="match-progress">${Object.keys(state.matchMatched).length} / ${mod.matchingGame.length} associadas</div>`}
      </div>
    `;
  } else if (state.view === "errors") {
    viewHtml = `
      <div class="em-card content-card">
        <h3 class="section-title">Encontra o Erro</h3>
        <p style="color:#8A8378; font-size:14px; margin-bottom:18px;">Cada frase tem um erro. Clica na palavra ou expressão que está errada.</p>
        ${mod.errorSpotting.map((item, exIdx) => {
          const pick = state.errorPicks[exIdx];
          // Tokenize: split on spaces but keep punctuation simple
          const words = item.text.split(" ");
          // Build clickable spans - try to match multi-word error phrases too
          const errorWords = item.error.split(" ");
          let html = "";
          let i = 0;
          while (i < words.length) {
            // check if this position starts the multi-word error
            const slice = words.slice(i, i + errorWords.length).join(" ").replace(/[.,!?]$/, "");
            if (slice.toLowerCase() === item.error.toLowerCase() && !pick) {
              html += `<span class="error-word" style="display:inline; margin:0 2px;" onclick="pickErrorWord(${exIdx}, '${item.error.replace(/'/g, "\\'")}')">${words.slice(i, i + errorWords.length).join(" ")}</span> `;
              i += errorWords.length;
            } else if (slice.toLowerCase() === item.error.toLowerCase() && pick) {
              const cls = pick.correct ? "highlight" : "";
              html += `<span class="${cls}">${words.slice(i, i + errorWords.length).join(" ")}</span> `;
              i += errorWords.length;
            } else {
              const w = words[i];
              if (!pick) {
                html += `<span class="error-word" style="display:inline; margin:0 2px;" onclick="pickErrorWord(${exIdx}, '${w.replace(/[.,!?]$/, "").replace(/'/g, "\\'")}')">${w}</span> `;
              } else {
                html += `${w} `;
              }
              i += 1;
            }
          }
          return `
            <div class="error-card em-card">
              <div class="error-text">${html}</div>
              ${pick ? `
                <div class="error-solution">
                  ${pick.correct ? "✅ Encontraste! " : "❌ Não é essa. "}
                  <strong>Correção:</strong> "${item.error}" → "${item.fix}". ${item.explanation}
                  ${!pick.correct ? `<div style="margin-top:8px;"><button class="reveal-btn" onclick="pickErrorWord(${exIdx}, '')" style="color:#A8453E;">Tentar de novo</button></div>` : ""}
                </div>
              ` : ""}
            </div>
          `;
        }).join("")}
      </div>
    `;
  } else if (state.view === "scenario") {
    const sc = mod.scenario;
    const scenarioKey = `${state.activeModule}-scenario`;
    const isDone = state.progress.completedGames[scenarioKey];
    viewHtml = `
      <div class="em-card content-card">
        <h3 class="section-title">${sc.title}</h3>
        <div class="scenario-setup">${sc.setup}</div>
        ${sc.dialogue.map((line, idx) => {
          if (!line.blank) {
            return `
              <div class="chat-bubble them">
                <div class="chat-speaker">${line.speaker}</div>
                ${line.line}
              </div>
            `;
          } else {
            const key = `${state.activeModule}-${idx}`;
            const exShown = state.scenarioExampleShown[key];
            return `
              <div class="chat-blank-area">
                <div class="chat-speaker" style="text-align:right; margin-bottom:4px; color:#8A8378;">${line.speaker}</div>
                <textarea class="chat-textarea" placeholder="Escreve a tua resposta em inglês..." oninput="updateScenarioAnswer('${key}', this.value)">${state.scenarioAnswers[key] || ""}</textarea>
                <p class="scenario-hint">💡 ${line.hint}</p>
                <button class="scenario-example-toggle" onclick="toggleScenarioExample('${key}')">${exShown ? "Esconder exemplo" : "Ver exemplo de resposta"}</button>
                ${exShown ? `<div class="scenario-example">${line.example}</div>` : ""}
              </div>
            `;
          }
        }).join("")}
        <div style="margin-top:18px; text-align:center;">
          ${isDone ? `
            <div class="module-complete-banner">
              <div class="big">🎭 Cenário concluído!</div>
              <div class="small">+${XP_SCENARIO} XP já recolhido. Podes copiar as tuas respostas para o chat e pedir feedback à IA.</div>
            </div>
          ` : `
            <button class="check-answer-btn" onclick="completeScenario(${state.activeModule})">Marcar cenário como concluído (+${XP_SCENARIO} XP)</button>
          `}
        </div>
      </div>
    `;
  } else if (state.view === "training") {
    viewHtml = `
      <div>
        <div class="em-card content-card" style="margin-bottom:16px;">
          <h3 class="section-title">Como usar o teu tempo (15-30 min/dia)</h3>
          <div style="display:grid; gap:10px; font-size:14.5px; color:#4A463F; line-height:1.6;">
            <div><strong>Dias 1-2 (Gramática, ~20 min):</strong> Lê a explicação do módulo, depois pede exercícios extra à IA.</div>
            <div><strong>Dias 3-4 (Conversação, ~15-20 min):</strong> Usa o Prompt #1 para simular uma conversa sobre o tema do módulo.</div>
            <div><strong>Dia 5 (Escrita, ~15 min):</strong> Escreve um texto curto e usa o Prompt #2 para feedback.</div>
            <div><strong>Fim de semana (~10-15 min):</strong> Pratica as expressões idiomáticas em frases próprias.</div>
          </div>
        </div>
        <h3 class="section-title">Prompts de treino — copia e usa com a IA</h3>
        ${TRAINING_PROMPTS.map(p => `
          <div class="em-card training-card">
            <div class="training-head">
              <div class="training-icon">${p.icon}</div>
              <strong class="training-title">${p.title}</strong>
            </div>
            <p class="training-text">${p.text}</p>
            <button class="copy-btn" onclick="copyPrompt(\`${p.text.replace(/`/g, "'")}\`)">Copiar prompt</button>
          </div>
        `).join("")}

        <h3 class="section-title" style="margin-top:24px;">Prompts avançados — para quando já dominares o vocabulário do módulo</h3>
        <p style="color:#8A8378; font-size:13.5px; margin-bottom:14px; margin-top:-6px;">Estes prompts assumem que já estudaste a gramática, vocabulário e idioms do módulo atual — usa-os para consolidar e ganhar confiança a falar.</p>
        ${ADVANCED_PROMPTS.map(p => `
          <div class="em-card training-card">
            <div class="training-head">
              <div class="training-icon">${p.icon}</div>
              <strong class="training-title">${p.title}</strong>
            </div>
            <p class="training-text">${p.text}</p>
            <button class="copy-btn" onclick="copyPrompt(\`${p.text.replace(/`/g, "'")}\`)">Copiar prompt</button>
          </div>
        `).join("")}
      </div>
    `;
  }

  const completeBtnClass = state.progress.completedModules[state.activeModule] ? "complete-btn done" : "complete-btn";
  const completeBtnIcon = state.progress.completedModules[state.activeModule] ? icons.check : icons.circle;
  const completeBtnText = state.progress.completedModules[state.activeModule] ? "Módulo concluído" : "Marcar módulo concluído";

  const xp = state.progress.xp || 0;
  const streak = state.progress.streak || 0;
  const earnedCount = Object.keys(state.progress.earnedBadges || {}).length;

  app.innerHTML = `
    ${state.xpToast ? `
      <div class="xp-toast">
        ${state.xpToast.isModule ? "🎉" : "⭐"} +${state.xpToast.amount} XP ${state.xpToast.isModule ? "— Módulo concluído!" : ""}
      </div>
    ` : ""}
    ${state.newBadgeToast ? `
      <div class="xp-toast" style="background:#9C7A3C;">
        ${state.newBadgeToast.icon} Nova conquista: ${state.newBadgeToast.name}!
      </div>
    ` : ""}
    <header class="app-header">
      <div class="header-inner">
        <div>
          <div class="eyebrow">Plano de Curso · 12 semanas</div>
          <h1 class="title">English in Motion</h1>
          <p class="subtitle">Da comunicação funcional à fluência natural — B1 para B2.</p>
          <div class="badges-row">
            ${BADGES.map(b => {
              const earned = state.progress.earnedBadges && state.progress.earnedBadges[b.id];
              return `<span class="badge ${earned ? "" : "locked"}" title="${b.name}">${b.icon} ${b.name}</span>`;
            }).join("")}
          </div>
        </div>
        <div style="text-align:right;">
          <div class="progress-label">
            Progresso geral
            <span style="font-size:11px; color:${state.syncStatus === "error" ? "#E89B8E" : "#7BB89F"};">${syncLabel()}</span>
          </div>
          <div style="display:flex; align-items:center; gap:12px; justify-content:flex-end;">
            <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${overallPct}%;"></div></div>
            <span class="progress-pct">${overallPct}%</span>
          </div>
          <div class="stats-row" style="margin-top:10px;">
            <div class="stat-chip">
              <span class="streak-flame ${streak > 0 ? "" : "cold"}">🔥</span>
              <span class="stat-value">${streak}</span> dias
            </div>
            <div class="stat-chip">
              <span>⭐</span>
              <span class="stat-value">${xp}</span> XP
            </div>
          </div>
          <button class="em-btn" onclick="handleLogout()" style="background:none; color:#9FCBBA; font-size:12px; margin-top:8px; border:none; cursor:pointer; text-decoration:underline;">Sair (${state.user.displayName || state.user.email})</button>
        </div>
      </div>
    </header>

    <div class="layout">
      <aside>
        <div class="em-card sidebar-card">${sidebarHtml}</div>
        <button class="em-btn reset-btn" onclick="resetProgress()">${icons.reset} Reiniciar progresso</button>
      </aside>

      <main>
        <div class="em-card module-header">
          <div class="module-header-inner">
            <div>
              <div class="em-pill">${mod.range}</div>
              <h2 class="module-title" style="margin-top:10px;">Módulo ${mod.id}: ${mod.title}</h2>
              <p class="module-theme">${mod.theme}</p>
            </div>
            <button class="em-btn ${completeBtnClass}" onclick="toggleModuleComplete(${state.activeModule})">
              ${completeBtnIcon} ${completeBtnText}
            </button>
          </div>
        </div>

        <div class="tabs-row">${tabsHtml}</div>

        ${viewHtml}

        <div class="nav-row">
          <button class="em-btn nav-btn prev" onclick="prevModule()" ${state.activeModule === 0 ? "disabled" : ""}>${icons.prev} Anterior</button>
          <button class="em-btn nav-btn next" onclick="nextModule()" ${state.activeModule === MODULES.length - 1 ? "disabled" : ""}>Próximo módulo ${icons.next}</button>
        </div>
      </main>
    </div>
  `;
}

render();
</script>
</body>
</html>
